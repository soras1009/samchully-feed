<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>삼천리 피드</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=DM+Sans:wght@500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --bg: #f5f4f0; --surface: #ffffff; --surface2: #f0efea;
  --text-primary: #1a1a1a; --text-secondary: #888; --text-muted: #bbb;
  --border: rgba(0,0,0,0.07); --accent: #005bac; --radius: 14px;
}
body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); min-height: 100vh; color: var(--text-primary); }
.header { position: sticky; top: 0; z-index: 100; background: var(--surface); border-bottom: 0.5px solid var(--border); }
.header-top { display: flex; align-items: center; justify-content: space-between; padding: 18px 20px 12px; }
.logo { font-family: 'DM Sans', sans-serif; font-size: 19px; font-weight: 600; color: var(--text-primary); letter-spacing: -0.5px; }
.logo em { color: var(--accent); font-style: normal; }
.date-badge { font-size: 11px; color: var(--text-secondary); background: var(--surface2); padding: 4px 10px; border-radius: 20px; }
.tabs { display: flex; overflow-x: auto; scrollbar-width: none; padding: 0 16px; border-bottom: 0.5px solid var(--border); }
.tabs::-webkit-scrollbar { display: none; }
.tab { flex-shrink: 0; padding: 10px 14px; font-size: 13px; font-weight: 500; color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent; transition: all .18s; white-space: nowrap; font-family: 'Noto Sans KR', sans-serif; margin-bottom: -0.5px; }
.tab.on { color: var(--text-primary); border-bottom-color: var(--accent); }
.feed { padding: 16px; display: flex; flex-direction: column; gap: 12px; max-width: 640px; margin: 0 auto; }
@media (min-width: 1024px) {
  .header { max-width: 1200px; margin: 0 auto; }
  .feed { max-width: 1200px; display: grid; grid-template-columns: repeat(2, 1fr); align-items: start; }
}
.loading { text-align: center; padding: 60px 20px; color: var(--text-secondary); font-size: 13px; }
.spinner { width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 12px; }
@keyframes spin { to { transform: rotate(360deg); } }
.card { background: var(--surface); border-radius: var(--radius); overflow: hidden; border: 0.5px solid var(--border); transition: transform .15s, box-shadow .15s; animation: fadeUp .3s ease forwards; opacity: 0; text-decoration: none; display: block; color: inherit; }
.card:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
.card:active { transform: scale(0.98); }
@keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.card:nth-child(1){ animation-delay:.03s } .card:nth-child(2){ animation-delay:.08s }
.card:nth-child(3){ animation-delay:.13s } .card:nth-child(4){ animation-delay:.18s }
.card:nth-child(5){ animation-delay:.23s } .card:nth-child(n+6){ animation-delay:.28s }
.thumb { width: 100%; height: 190px; background: var(--surface2); display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
.thumb img { width: 100%; height: 100%; object-fit: contain; background: #fff; }
.thumb.yt-bg { background: #0a0a0a; }
.play-btn { position: absolute; width: 48px; height: 48px; background: rgba(210,25,25,.92); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
.play-btn::after { content: ''; border-left: 16px solid #fff; border-top: 10px solid transparent; border-bottom: 10px solid transparent; margin-left: 4px; }
.yt-label { position: absolute; bottom: 10px; right: 10px; background: rgba(0,0,0,.8); color: #fff; font-size: 11px; padding: 3px 8px; border-radius: 4px; }
.card-body { padding: 14px 16px 16px; }
.tag-row { display: flex; align-items: center; gap: 7px; margin-bottom: 8px; }
.tag { font-size: 10px; font-weight: 500; padding: 3px 8px; border-radius: 5px; }
.tag-news  { background: #E6F1FB; color: #185FA5; }
.tag-yt    { background: #FCEBEB; color: #A32D2D; }
.tag-insta { background: #FBEAF0; color: #993556; }
.tag-blog  { background: #EAF3DE; color: #3B6D11; }
.tag-sabo  { background: #FFF3CD; color: #856404; }
.new-dot   { width: 6px; height: 6px; background: #e53e3e; border-radius: 50%; flex-shrink: 0; }
.card-title { font-size: 14px; font-weight: 500; color: var(--text-primary); line-height: 1.6; margin-bottom: 6px; }
.card-meta  { font-size: 11px; color: var(--text-secondary); }
.related-section { border-top: 0.5px solid var(--border); padding: 10px 16px 12px; }
.related-btn { font-size: 12px; font-weight: 500; color: var(--accent); background: none; border: none; cursor: pointer; padding: 0; font-family: 'Noto Sans KR', sans-serif; }
.related-btn:disabled { color: var(--text-muted); }
.related-list { margin-top: 8px; display: flex; flex-direction: column; gap: 8px; }
.related-item { display: flex; flex-direction: column; gap: 2px; text-decoration: none; padding: 8px 10px; background: var(--surface2); border-radius: 8px; }
.related-title { font-size: 12px; font-weight: 500; color: var(--text-primary); line-height: 1.5; }
.related-meta  { font-size: 11px; color: var(--text-secondary); }
.related-empty { font-size: 12px; color: var(--text-muted); padding: 4px 0; }
.empty { text-align: center; padding: 60px 20px; color: var(--text-secondary); font-size: 13px; }
.bottom-pad { height: 40px; }
</style>
</head>
<body>
<div class="header">
  <div class="header-top">
    <div class="logo">삼천리<em>.</em>feed</div>
    <div class="date-badge" id="date-badge"></div>
  </div>
  <div class="tabs" id="tabs">
    <div class="tab on" data-t="all">전체</div>
    <div class="tab" data-t="news">뉴스</div>
    <div class="tab" data-t="YOUTUBE">유튜브</div>
    <div class="tab" data-t="INSTAGRAM">인스타</div>
    <div class="tab" data-t="BLOG">블로그</div>
    <div class="tab" data-t="COMPANY_MAGAZINE">사보</div>
  </div>
</div>
<div class="feed" id="feed">
  <div class="loading"><div class="spinner"></div>불러오는 중...</div>
</div>
<div class="bottom-pad"></div>
<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
